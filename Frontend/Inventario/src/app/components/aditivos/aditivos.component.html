<div class="card mb-4">
  <div class="card-body">
    <h2 class="h5 mb-3">{{ editingId ? 'Editar aditivo' : 'Novo aditivo' }}</h2>

    <form (ngSubmit)="submit()" #formAditivo="ngForm">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Contrato</label>
          <app-searchable-select
            name="contratoId"
            [(ngModel)]="form.contratoId"
            [options]="contratoOptions"
            placeholder="Selecione"
            searchPlaceholder="Pesquisar contrato"
            [required]="true"
          ></app-searchable-select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Numero</label>
          <input class="form-control" name="numero" [(ngModel)]="form.numero" required />
        </div>

        <div class="col-md-3">
          <label class="form-label">ID Sei</label>
          <input class="form-control" name="idSei" [(ngModel)]="form.idSei" required />
        </div>

        <div class="col-md-2">
          <label class="form-label">Tipo</label>
          <select class="form-select" name="tipo" [(ngModel)]="form.tipo" (ngModelChange)="onTipoChange()" required>
            <option *ngFor="let tipo of tipoAditivoOptions" [ngValue]="tipo.value">{{ tipo.label }}</option>
          </select>
        </div>

        <div class="col-md-2">
          <label class="form-label">Data inicial</label>
          <input type="date" class="form-control" name="dataInicio" [(ngModel)]="form.dataInicio" required />
        </div>

        <div class="col-md-3" *ngIf="form.tipo === TipoAditivo.Renovacao">
          <label class="form-label">Nova vigencia</label>
          <input type="date" class="form-control" name="novaVigencia" [(ngModel)]="form.novaVigencia" />
        </div>

        <div class="col-md-3" *ngIf="form.tipo !== TipoAditivo.Renovacao">
          <label class="form-label">Valor</label>
          <input
            type="text"
            class="form-control"
            name="valor"
            [(ngModel)]="form.valor"
            currencyMask
            [options]="{ prefix: 'R$ ', thousands: '.', decimal: ',', precision: 2 }"
            required
          />
        </div>

        <div class="col-md-3">
          <label class="form-label">Observacao</label>
          <input class="form-control" name="observacao" [(ngModel)]="form.observacao" />
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary" type="submit" [disabled]="saving || !formAditivo.form.valid">
          {{ saving ? 'Salvando...' : (editingId ? 'Atualizar' : 'Cadastrar') }}
        </button>
        <button class="btn btn-secondary" type="button" (click)="cancel()" *ngIf="editingId">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <h2 class="h5 mb-3">Aditivos</h2>

    <table class="table table-striped" *ngIf="!loading">
      <thead>
        <tr>
          <th>Numero</th>
          <th>ID Sei</th>
          <th>Contrato</th>
          <th>Tipo</th>
          <th>Data</th>
          <th>Valor</th>
          <th class="text-end"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of aditivos">
          <td>{{ item.numero }}</td>
          <td>
            <span class="copy-value">
              <span>{{ item.idSei }}</span>
              <button *ngIf="item.idSei" type="button" class="copy-button" (click)="copyToClipboard(item.idSei)" title="Copiar ID Sei" aria-label="Copiar ID Sei">
                <i class="fa-solid fa-copy"></i>
              </button>
            </span>
          </td>
          <td>{{ item.contratoId }}</td>
          <td>{{ getTipoAditivoLabel(item.tipo) }}</td>
          <td>{{ item.dataInicio | date:'dd/MM/yyyy' }}</td>
          <td>{{ item.valor | currency:'BRL' }}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-standard-edit" (click)="edit(item)">Editar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
