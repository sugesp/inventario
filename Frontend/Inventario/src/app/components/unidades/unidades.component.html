<div class="card">
  <div class="card-body">
    <div class="list-header">
      <div class="list-header-copy">
        <span class="list-header-eyebrow">Estrutura organizacional</span>
        <h2 class="list-header-title">Unidades</h2>
        <p class="list-header-subtitle">Cadastro de unidades e hierarquia administrativa.</p>
      </div>
      <button class="btn btn-standard-new" type="button" (click)="openCreateModal()">Nova unidade</button>
    </div>

    <div class="tree-card" *ngIf="unidades.length > 0; else semUnidades">
      <div class="tree-head">
        <span>Estrutura hierárquica</span>
        <span>{{ unidades.length }} unidade(s)</span>
      </div>

      <div class="tree-body">
        <ng-container *ngTemplateOutlet="treeNodes; context: { $implicit: unidadesTree }"></ng-container>
      </div>
    </div>
  </div>
</div>

<ng-template #semUnidades>
  <div class="empty-state">Nenhuma unidade cadastrada.</div>
</ng-template>

<ng-template #treeNodes let-nodes>
  <div class="tree-level">
    <div class="tree-node" *ngFor="let node of nodes">
      <div class="tree-row" [style.--tree-depth]="node.depth">
        <button
          class="tree-toggle"
          type="button"
          *ngIf="hasChildren(node); else treeSpacer"
          (click)="toggleNode(node.unidade.id)"
          [attr.aria-label]="isExpanded(node.unidade.id) ? 'Recolher unidade' : 'Expandir unidade'"
        >
          {{ isExpanded(node.unidade.id) ? '−' : '+' }}
        </button>
        <ng-template #treeSpacer>
          <span class="tree-spacer"></span>
        </ng-template>

        <div class="tree-content">
          <div class="tree-primary">
            <strong>{{ node.unidade.sigla }}</strong>
            <span>{{ node.unidade.nome }}</span>
          </div>
          <div class="tree-actions">
            <button
              class="btn btn-sm btn-standard-action tree-edit-button"
              type="button"
              (click)="edit(node.unidade)"
              [attr.aria-label]="'Editar unidade ' + node.unidade.sigla"
              title="Editar unidade"
            >
              <i class="fa-solid fa-pen-to-square tree-edit-icon" aria-hidden="true"></i>
              <span class="tree-edit-label">Editar</span>
            </button>
          </div>
        </div>
      </div>

      <div class="tree-children" *ngIf="hasChildren(node) && isExpanded(node.unidade.id)">
        <ng-container *ngTemplateOutlet="treeNodes; context: { $implicit: node.children }"></ng-container>
      </div>
    </div>
  </div>
</ng-template>

<div class="modal-backdrop-custom" *ngIf="showModal" (click)="closeModal()"></div>
<div class="modal-custom" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header-custom">
      <h4>{{ editingId ? 'Editar unidade' : 'Nova unidade' }}</h4>
      <button class="btn-close" type="button" aria-label="Close" (click)="closeModal()"></button>
    </div>

    <form (ngSubmit)="submit()" #unidadeFormNg="ngForm">
      <div class="modal-body-custom">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label">Nome</label>
            <input class="form-control" name="unidadeNome" [(ngModel)]="form.nome" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Sigla</label>
            <input class="form-control" name="unidadeSigla" [(ngModel)]="form.sigla" required />
          </div>
          <div class="col-md-12">
            <label class="form-label">Unidade superior</label>
            <app-searchable-select
              name="unidadeSuperiorId"
              [(ngModel)]="form.unidadeSuperiorId"
              [options]="unidadesPaiOptions"
              placeholder="Selecione"
              searchPlaceholder="Pesquisar unidade superior"
              emptyOptionLabel="Nenhuma"
            ></app-searchable-select>
          </div>
        </div>
      </div>

      <div class="modal-footer-custom">
        <button class="btn btn-secondary" type="button" (click)="closeModal()">Fechar</button>
        <button class="btn btn-primary" type="submit" [disabled]="saving || !unidadeFormNg.form.valid">
          {{ saving ? 'Salvando...' : 'Salvar unidade' }}
        </button>
      </div>
    </form>
  </div>
</div>
