<section class="card">
  <div class="card-body">
    <div class="list-header">
      <div class="list-header-copy">
        <span class="list-header-eyebrow">Cadastro base</span>
        <h2 class="list-header-title">Equipes</h2>
        <p class="list-header-subtitle">Defina as equipes responsáveis pelos locais e pelo inventário.</p>
      </div>
      <button class="btn btn-standard-new" type="button" (click)="openCreateModal()">Nova equipe</button>
    </div>

    <div class="table-card" *ngIf="equipes.length > 0; else semEquipes">
      <div class="table-head">
        <span>{{ equipes.length }} equipe(s)</span>
      </div>

      <div class="table-responsive">
        <table class="table table-sm align-middle mb-0">
          <thead>
            <tr>
              <th>Descrição</th>
              <th class="text-end"></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of equipes">
              <td>{{ item.descricao }}</td>
              <td class="text-end">
                <div class="row-actions">
                  <button class="btn btn-sm btn-standard-action" type="button" (click)="edit(item)">Editar</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>

<ng-template #semEquipes>
  <div class="empty-state" *ngIf="!loading">Nenhuma equipe cadastrada.</div>
</ng-template>

<div class="modal-backdrop-custom" *ngIf="showModal" (click)="closeModal()"></div>
<div class="modal-custom" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header-custom">
      <h4>{{ editingId ? 'Editar equipe' : 'Nova equipe' }}</h4>
      <button class="btn-close" type="button" aria-label="Close" (click)="closeModal()"></button>
    </div>

    <form (ngSubmit)="submit()" #equipeFormNg="ngForm">
      <div class="modal-body-custom">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Descrição</label>
            <input class="form-control" name="equipeDescricao" [(ngModel)]="form.descricao" required />
          </div>
        </div>
      </div>

      <div class="modal-footer-custom">
        <button class="btn btn-secondary" type="button" (click)="closeModal()">Fechar</button>
        <button class="btn btn-primary" type="submit" [disabled]="saving || !equipeFormNg.form.valid">
          {{ saving ? 'Salvando...' : 'Salvar equipe' }}
        </button>
      </div>
    </form>
  </div>
</div>
